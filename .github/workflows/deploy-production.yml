name: Deploy Production (cPanel)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate_build_package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, xml, ctype, json, tokenizer, pdo, pdo_mysql

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate App Key
        run: php artisan key:generate

      - name: Run Test Suite
        run: php artisan test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Frontend Assets
        run: |
          npm ci
          npm run build

      - name: Prepare Production Dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Create Release Package
        run: |
          mkdir -p release
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='tests/' \
            --exclude='docs/' \
            --exclude='*.md' \
            --exclude='*.md.*' \
            --exclude='deploy/' \
            --exclude='storage/' \
            --exclude='release/' \
            --exclude='.env' \
            --exclude='.env.*' \
            ./ release/

          # Ensure writable runtime directories exist on first deployment.
          mkdir -p release/storage/app/public
          mkdir -p release/storage/framework/cache/data
          mkdir -p release/storage/framework/sessions
          mkdir -p release/storage/framework/testing
          mkdir -p release/storage/framework/views
          mkdir -p release/storage/logs
          mkdir -p release/bootstrap/cache

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release/

  deploy_remote:
    runs-on: ubuntu-latest
    needs: validate_build_package
    if: github.ref == 'refs/heads/main'

    env:
      CPANEL_WEB_ROOT: ${{ endsWith(secrets.CPANEL_TARGET_DIR, '/') && secrets.CPANEL_TARGET_DIR || format('{0}/', secrets.CPANEL_TARGET_DIR) }}
      CPANEL_APP_DIR: ${{ secrets.CPANEL_APP_DIR != '' && (endsWith(secrets.CPANEL_APP_DIR, '/') && secrets.CPANEL_APP_DIR || format('{0}/', secrets.CPANEL_APP_DIR)) || format('/home/{0}/web-audit-system-/', secrets.CPANEL_FTP_USERNAME) }}
      CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT != '' && secrets.CPANEL_SSH_PORT || 22 }}

    steps:
      - name: Download Release Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release/

      - name: Upload Release via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ env.CPANEL_SSH_PORT }}
          source: "release/*"
          target: ${{ env.CPANEL_APP_DIR }}
          strip_components: 1
          overwrite: true

      - name: Activate Release and Publish Web Root
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ env.CPANEL_SSH_PORT }}
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="${{ env.CPANEL_APP_DIR }}"
            WEB_ROOT="${{ env.CPANEL_WEB_ROOT }}"
            APP_DIR="${APP_DIR%/}"
            WEB_ROOT="${WEB_ROOT%/}"

            mkdir -p "$APP_DIR"
            mkdir -p "$WEB_ROOT"

            if [ -d "$APP_DIR/public" ]; then
              if command -v rsync >/dev/null 2>&1; then
                rsync -a --delete --exclude='cgi-bin/' "$APP_DIR/public/" "$WEB_ROOT/"
              else
                cp -a "$APP_DIR/public/." "$WEB_ROOT/"
              fi
            fi

            cat > "$WEB_ROOT/index.php" <<PHP
            <?php
            use Illuminate\\Foundation\\Application;

            define('LARAVEL_START', microtime(true));

            if (file_exists(\$maintenance = '${APP_DIR}/storage/framework/maintenance.php')) {
                require \$maintenance;
            }

            require '${APP_DIR}/vendor/autoload.php';

            \$app = require_once '${APP_DIR}/bootstrap/app.php';

            \$app->handleRequest(Illuminate\\Http\\Request::capture());
            PHP

            ln -sfn "${APP_DIR}/storage/app/public" "${WEB_ROOT}/storage"

            if [ -f "${APP_DIR}/.env" ]; then
              cd "$APP_DIR"
              php artisan migrate --force || true
              php artisan optimize:clear || true
              php artisan config:cache || true
              php artisan route:cache || true
              php artisan view:cache || true
            else
              echo "WARNING: ${APP_DIR}/.env belum ada di server; lewati perintah artisan."
            fi
